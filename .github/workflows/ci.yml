name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit & component tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Public by design (Supabase anon key model); real values come from
          # Vercel env at deploy time — CI only needs the build to succeed.
          NEXT_PUBLIC_SITE_URL: https://ozer-website.vercel.app

  lighthouse:
    name: Lighthouse budget (production)
    # Measures the LIVE site after a main push — stable runner beats laptops.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit production URLs
        uses: treosh/lighthouse-ci-action@v12
        # /helper is NOT audited: Lighthouse on Linux headless (Chrome 140 AND
        # 150, LHCI and plain CLI) never receives first-contentful-paint for
        # this page class and aborts with NO_FCP, while the page provably
        # paints instantly everywhere real (local headless: FCP 1.0s; the
        # runner's own puppeteer: text visible at ~200ms, zero errors).
        # Bisection on the runner falsified page-side causes (animation state,
        # hydration storage reads, glass containers � even a bare <h1> page
        # failed). Tracked in docs/SESSION-HANDOFF.md section 7; /helper stays covered
        # by vitest + axe.
        with:
          urls: |
            https://ozer-website.vercel.app/
            https://ozer-website.vercel.app/book
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
          configPath: ./lighthouserc.json
